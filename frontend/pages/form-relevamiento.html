<div class="card shadow-sm p-4 animate__animated animate__fadeIn">
    <h4 class="fw-bold text-dark mb-4" id="titulo-form-relevamiento">
        <i class="bi bi-file-earmark-plus-fill text-primary me-2"></i> Nuevo Relevamiento
    </h4>
    
    <form id="form-nuevo-relevamiento" novalidate>
        <input type="hidden" id="r_id_edicion">

        <div class="row g-3 mb-3">
            <div class="col-md-4">
                <label for="r_departamento" class="form-label fw-semibold">Departamento *</label>
                <select id="r_departamento" class="form-select" required>
                    <option value="" selected disabled>Seleccione Departamento...</option>
                    </select>
            </div>
            <div class="col-md-4">
                <label for="r_localidad" class="form-label fw-semibold">Localidad *</label>
                <select id="r_localidad" class="form-select" required>
                    <option value="" selected disabled>Seleccione Localidad...</option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="r_barrio" class="form-label fw-semibold">Barrio *</label>
                <input type="text" id="r_barrio" class="form-control" placeholder="Ej: B° Sarmiento" required>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <label for="r_tipo_evento" class="form-label fw-semibold">Tipo de Evento *</label>
                <select id="r_tipo_evento" class="form-select" required>
                    <option value="" selected disabled>Seleccione Evento...</option>
                    <option value="Inundación">Inundación</option>
                    <option value="Incendio Forestal">Incendio Forestal</option>
                    <option value="Vientos Fuertes / Tornado">Vientos Fuertes / Tornado</option>
                    <option value="Derrumbe">Derrumbe</option>
                    <option value="Otros">Otros</option>
                </select>
            </div>
            <!-- Input condicional para cuando elijo "Otros" -->
            <div class="col-md-4 d-none" id="div-otro-evento">
                <label for="r_otro_evento" class="form-label fw-semibold">Especifique Otro Evento *</label>
                <input type="text" id="r_otro_evento" class="form-control" placeholder="Describa el evento...">
            </div>
            <div class="col-md-4">
                <label for="r_solicitante" class="form-label fw-semibold">Solicitante (Origen del Aviso)</label>
                <input type="text" id="r_solicitante" class="form-control" placeholder="Ej: Bomberos Voluntarios, Vecino...">
            </div>
            <div class="col-md-2">
                <label for="r_urgencia" class="form-label fw-semibold">Prioridad General</label>
                <select id="r_urgencia" class="form-select">
                    <option value="Baja"selected>Baja</option>
                    <option value="Media">Media</option>
                    <option value="Alta">Alta</option>
                </select>
            </div>
            <div class="col-md-2">
                <label for="r_relevador" class="form-label fw-semibold">Relevador Asignado *</label>
                <select id="r_relevador" class="form-select" required>
                    <option value="" selected disabled>Asignar a...</option>
                    </select>
            </div>
        </div>

        <div class="d-flex justify-content-end gap-2 border-top pt-3">
            <button type="button" class="btn btn-secondary" onclick="verListaRelevamientos()">
                <i class="bi bi-x-circle"></i> Cancelar
            </button>
            <button type="submit" class="btn btn-success">
                <i class="bi bi-save"></i> Guardar e Inicializar
            </button>
        </div>
    </form>
</div>
