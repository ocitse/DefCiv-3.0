<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema - Defensa Civil</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/login.css"> </head>
<body>
    <div class="login-container">
        <div class="login-box">
            
            <div class="logo-area">
                <img src="/frontend/assets/logo.jpg" id="logo-image" alt="Logo Defensa Civil">
                <h1>Defensa Civil</h1>
                <p>Sistema de Gestión de Asistencia</p>
            </div>
            
            <form id="login-form">
                <div class="input-group">
                    <i class="bi bi-person-circle icon"></i>
                    <input type="text" id="username" placeholder="Usuario o DNI" required>
                </div>
                
                <div class="input-group">
                    <i class="bi bi-lock-fill icon"></i>
                    <input type="password" id="password" class="form-control" placeholder="Contraseña" required autocomplete="current-password">
                </div>

                <div class="feedback-message" id="error-message" style="color: red; font-size: 14px; margin-bottom: 10px;"></div>
                
                <button type="submit" id="btn-login" class="btn btn-primary w-100">Ingresar</button>
                
                <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
            </form>
            
        </div>
    </div>

    <script type="module" src="../js/login.js"></script>
</body>
</html>
