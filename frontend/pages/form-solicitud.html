<div class="card shadow-sm p-4 animate__animated animate__fadeIn">
    <h4 class="fw-bold text-dark mb-4">
        <i class="bi bi-file-earmark-arrow-up-fill text-warning me-2"></i> Generar Solicitud de Provisiones
    </h4>
    
    <form id="form-nueva-solicitud" novalidate>
        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <label for="s_relevamiento_origen" class="form-label fw-semibold">Seleccionar Relevamiento de Origen *</label>
                <select id="s_relevamiento_origen" class="form-select" required>
                    <option value="" selected disabled>Seleccione un relevamiento censado...</option>
                    </select>
                <div class="form-text">Solo aparecen relevamientos que contienen familias censadas.</div>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Zona de Cobertura Detectada</label>
                <input type="text" id="s_zona_espejo" class="form-control" readonly style="background-color: #e9ecef;" placeholder="Seleccione un origen arriba">
            </div>
        </div>

        <div class="p-3 border rounded bg-light mb-4">
            <h6 class="fw-bold text-dark mb-3"><i class="bi bi-calculator-fill text-secondary me-2"></i> Consolidado de Insumos Requeridos por el Territorio</h6>
            <div class="row g-2 text-center">
                <div class="col-md-2 bg-white p-2 border rounded shadow-sm mx-auto">
                    <small class="text-muted d-block fw-semibold">Alimentos</small>
                    <span class="fs-4 fw-bold text-primary" id="sum-alimentos">0</span>
                </div>
                <div class="col-md-2 bg-white p-2 border rounded shadow-sm mx-auto">
                    <small class="text-muted d-block fw-semibold">Abrigos</small>
                    <span class="fs-4 fw-bold text-primary" id="sum-abrigos">0</span>
                </div>
                <div class="col-md-2 bg-white p-2 border rounded shadow-sm mx-auto">
                    <small class="text-muted d-block fw-semibold">Frazadas</small>
                    <span class="fs-4 fw-bold text-primary" id="sum-frazadas">0</span>
                </div>
                <div class="col-md-2 bg-white p-2 border rounded shadow-sm mx-auto">
                    <small class="text-muted d-block fw-semibold">Bidones Agua</small>
                    <span class="fs-4 fw-bold text-primary" id="sum-agua">0</span>
                </div>
                <div class="col-md-2 bg-white p-2 border rounded shadow-sm mx-auto">
                    <small class="text-muted d-block fw-semibold">K. Higiene</small>
                    <span class="fs-4 fw-bold text-primary" id="sum-higiene">0</span>
                </div>
                <div class="col-md-2 bg-white p-2 border rounded shadow-sm mx-auto">
                    <small class="text-muted d-block fw-semibold">Colchones</small>
                    <span class="fs-4 fw-bold text-primary" id="sum-colchones">0</span>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-end gap-2 border-top pt-3">
            <button type="button" class="btn btn-secondary" onclick="verListaSolicitudes()">
                <i class="bi bi-x-circle"></i> Cancelar
            </button>
            <button type="submit" class="btn btn-warning text-dark fw-bold">
                <i class="bi bi-send-check-fill"></i> Emitir Solicitud Oficial
            </button>
        </div>
    </form>
</div>
