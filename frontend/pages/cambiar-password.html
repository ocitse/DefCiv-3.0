<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defensa Civil - Cambiar Contraseña</title>

    <script>
        (function () {
            const token = sessionStorage.getItem('token');
            const usuarioRaw = sessionStorage.getItem('usuario');

            // Si no hay sesión, al login de una
            if (!token || !usuarioRaw) {
                window.location.href = 'login.html';
                return;
            }

            // Si ya cambió la contraseña, al index al toque sin mostrar nada
            const usuario = JSON.parse(usuarioRaw);
            if (!usuario.requiereCambioPass) {
                window.location.href = '../../index.html';
            }
        })();
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-change { max-width: 450px; margin-top: 100px; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card card-change shadow-sm p-4 w-100">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock text-warning" style="font-size: 3rem;"></i>
            <h3 class="mt-2">Actualización Obligatoria</h3>
            <p class="text-muted small">Por seguridad, debes cambiar tu contraseña predeterminada antes de ingresar al sistema.</p>
        </div>

        <form id="change-pass-form">
            <div class="mb-3">
                <label for="pass-actual" class="form-label">Contraseña Actual (DNI)</label>
                <input type="password" id="pass-actual" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="pass-nueva" class="form-label">Nueva Contraseña</label>
                <input type="password" id="pass-nueva" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="pass-repetir" class="form-label">Repetir Nueva Contraseña</label>
                <input type="password" id="pass-repetir" class="form-control" required>
            </div>

            <div id="alert-message" class="alert d-none small text-center" role="alert"></div>

            <button type="submit" id="btn-submit" class="btn btn-warning w-100 text-white fw-bold">
                <i class="bi bi-check-circle"></i> Actualizar y Entrar
            </button>
        </form>
    </div>
</div>

<script src="../js/cambiar-password.js"></script>
</body>
</html>
