<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-3">
            <i id="icono-header" class="bi bi-shield-lock text-warning fs-1"></i>
            <h3 id="titulo-header" class="mt-2">Actualización Obligatoria</h3>
            <p id="descripcion-header" class="text-muted small">Por seguridad, debes cambiar tu contraseña.</p>
        </div>

        <div id="alert-message" class="alert d-none small text-center" role="alert"></div>

        <form id="change-pass-form">
            <div class="mb-3">
                <label id="label-pass-actual" for="pass-actual" class="form-label">Contraseña Actual</label>
                <input type="password" class="form-control" id="pass-actual" required>
            </div>
            <div class="mb-3">
                <label for="pass-nueva" class="form-label">Nueva Contraseña</label>
                <input type="password" class="form-control" id="pass-nueva" required>
            </div>
            <div class="mb-3">
                <label for="pass-repetir" class="form-label">Repetir Nueva Contraseña</label>
                <input type="password" class="form-control" id="pass-repetir" required>
            </div>
            <button type="submit" id="btn-submit" class="btn btn-warning w-100 text-white fw-bold">Actualizar Contraseña</button>
        </form>
    </div>

    <script src="/js/cambiar-password.js"></script>
</body>
</html>
