<div class="card shadow-sm p-4 animate__animated animate__fadeIn">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold text-dark m-0">
            <i class="bi bi-file-earmark-text-fill text-warning me-2"></i> Solicitudes de Provisiones
        </h4>
        <button class="btn btn-warning text-dark fw-semibold d-flex align-items-center gap-2" onclick="mostrarFormularioNuevaSolicitud()">
            <i class="bi bi-file-earmark-medical"></i> Crear Solicitud desde Relevamiento
        </button>
    </div>
    
    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle rounded overflow-hidden border">
            <thead class="table-dark">
                <tr>
                    <th style="width: 12%">N° Solicitud</th>
                    <th style="width: 15%">Origen (Rev)</th>
                    <th style="width: 20%">Zona Afectada</th>
                    <th style="width: 15%">Fecha Emisión</th>
                    <th style="width: 13%" class="text-center">Familias Totales</th>
                    <th style="width: 13%">Estado Trámite</th>
                    <th style="width: 12%" class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-solicitudes-body">
                <tr>
                    <td colspan="7" class="text-center text-muted py-4">
                        No hay solicitudes de provisión registradas en el circuito.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
