<div class="card shadow-sm p-4 animate__animated animate__fadeIn">
    <div class="bg-light p-3 rounded border mb-4">
        <h5 class="fw-bold text-secondary mb-2"><i class="bi bi-info-circle-fill text-info"></i> Contexto Territorial</h5>
        <div class="row g-2 text-dark small" id="contexto-relevamiento-activo">
            </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold text-dark m-0"><i class="bi bi-people-fill text-primary"></i> Familias Damnificadas</h5>
        <div class="d-flex gap-2">
            <button class="btn btn-success btn-sm d-flex align-items-center gap-1" onclick="mostrarFormularioNuevaFamilia()">
                <i class="bi bi-person-plus-fill"></i> Agregar Nueva Familia
            </button>
            <button class="btn btn-outline-secondary btn-sm" onclick="verListaRelevamientos()">
                <i class="bi bi-arrow-left"></i> Volver a Relevamientos
            </button>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped align-middle border rounded">
            <thead class="table-secondary">
                <tr>
                    <th style="width: 5%">#</th>
                    <th style="width: 15%">DNI Jefe/a</th>
                    <th style="width: 25%">Apellido y Nombre</th>
                    <th style="width: 15%" class="text-center">Integrantes</th>
                    <th style="width: 15%">Urgencia Familiar</th>
                    <th style="width: 15%">Estado Asistencia</th>
                    <th style="width: 10%" class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-familias-body">
                </tbody>
        </table>
    </div>
</div>
