<div class="card shadow-sm p-4 animate__animated animate__fadeIn">
    <button type="button" class="btn btn-outline-secondary" id="btn-volver-panel">
        <i class="bi bi-house-door"></i> Volver al panel
    </button>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold text-dark m-0">
            <i class="bi bi-journal-text text-primary me-2"></i> Lista de Relevamientos
        </h4>
        <button class="btn btn-primary d-flex align-items-center gap-2" onclick="mostrarFormularioNuevoRelevamiento()">
            <i class="bi bi-plus-circle-fill"></i> Nuevo Relevamiento
        </button>
    </div>
    
    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle rounded overflow-hidden border">
            <thead class="table-dark">
                <tr>
                    <th style="width: 10%">ID</th>
                    <th style="width: 12%">Fecha</th>
                    <th style="width: 18%">Ubición (Dep / Loc)</th>
                    <th style="width: 15%">Barrio</th>
                    <th style="width: 12%">Evento</th>
                    <th style="width: 13%">Solicitante</th>
                    <th style="width: 10%">Urgencia</th>
                    <th style="width: 10%" class="text-center">Familias</th>
                    <th style="width: 10%" class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-relevamientos-body">
                <tr>
                    <td colspan="9" class="text-center text-muted py-4">
                        <div class="spinner-border spinner-border-sm text-secondary me-2" role="status"></div>
                        Cargando relevamientos...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
