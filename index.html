<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Defensa Civil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="./frontend/css/index.css">
</head>
<body>

    <div class="sidebar d-none d-md-flex flex-column p-3 text-white bg-dark" id="sidebar-desktop" style="width: 280px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 1000;">
        <div class="d-flex align-items-center gap-2 mb-3 me-md-auto text-decoration-none">
            <span class="fs-4 text-warning"><i class="bi bi-shield-fill-exclamation"></i></span>
            <div class="d-flex flex-column lh-sm">
                <span class="fs-4 fw-bold text-warning">Defensa Civil</span>
                <small class="text-white-50" style="font-size: 13px;">
                    <i class="bi bi-person-circle me-1"></i><span id="nombre-usuario-desktop">Cavalieri Omar</span>
                </small>
            </div>
        </div>
        <hr>
        
        <ul class="nav nav-pills flex-column mb-auto gap-1" id="sidebar-app-desktop">
            <li class="nav-item">
                <a href="#" class="nav-link text-white" id="btn-menu-inicio">
                    <i class="bi bi-house-door-fill me-2"></i> Inicio
                </a>
            </li>
            <li>
                <a href="#" class="nav-link active" id="btn-menu-relevamientos">
                    <i class="bi bi-journal-text me-2"></i> Relevamientos
                </a>
            </li>
            <li>
                <a href="#" class="nav-link text-white" id="btn-menu-solicitudes">
                    <i class="bi bi-file-earmark-text me-2"></i> Solicitudes
                </a>
            </li>
            <li>
                <a href="#" class="nav-link text-white" id="btn-menu-config">
                    <i class="bi bi-gear-fill me-2"></i> Configuración
                </a>
            </li>
        </ul>
        <hr>
        
        <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" id="dropdownUserDesktop" data-bs-toggle="dropdown" aria-expanded="false">
                <strong>Opciones de Cuenta</strong>
            </a>
            <ul class="dropdown-menu dropdown-menu-dark text-small shadow" aria-labelledby="dropdownUserDesktop">
                <li><a class="dropdown-item" href="#" id="btn-cambiar-pass-desktop"><i class="bi bi-key-fill me-2"></i> Cambiar Clave</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="#" id="btn-salir-desktop"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</a></li>
            </ul>
        </div>
    </div>
    
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary sticky-top px-3 d-flex d-md-none position-relative" id="sidebar-mobile" style="z-index: 1000; width: 100%;">
        <div class="container-fluid d-flex align-items-center justify-content-between p-0">
            
            <div class="navbar-brand fw-bold text-warning d-flex align-items-center gap-2 m-0 fs-5">
                <i class="bi bi-shield-fill-exclamation"></i> Defensa Civil
            </div>
    
            <div class="d-flex align-items-center gap-3">
                <div class="dropdown">
                    <a class="text-white text-decoration-none dropdown-toggle d-flex align-items-center gap-1" href="#" id="dropdownUserMobile" role="button" data-bs-toggle="dropdown" aria-expanded="false" style="font-size: 14px;">
                        <i class="bi bi-person-circle fs-5"></i>
                        <span id="nombre-usuario-mobile">Cavalieri Omar</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end shadow" aria-labelledby="dropdownUserMobile">
                        <li><a class="dropdown-item" href="#" id="btn-cambiar-pass-mobile"><i class="bi bi-key-fill me-2"></i> Cambiar Clave</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" id="btn-salir-mobile"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</a></li>
                    </ul>
                </div>
    
                <button class="navbar-toggler p-1" type="button" data-bs-collapse-button data-bs-toggle="collapse" data-bs-target="#navbarNavMobile" aria-controls="navbarNavMobile" aria-expanded="false" aria-label="Toggle navigation" style="font-size: 14px;">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
    
            <div class="collapse navbar-collapse text-start" id="navbarNavMobile">
                <ul class="navbar-nav gap-1 pt-3 pb-2" id="sidebar-app-mobile">
                    <li class="nav-item">
                        <a class="nav-link" id="btn-mobile-inicio" href="#"><i class="bi bi-house-door-fill me-2"></i> Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" id="btn-mobile-relevamientos" href="#"><i class="bi bi-journal-text me-2"></i> Relevamientos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="btn-mobile-solicitudes" href="#"><i class="bi bi-file-earmark-text me-2"></i> Solicitudes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="btn-mobile-config" href="#"><i class="bi bi-gear-fill me-2"></i> Configuración</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-content-wrapper">
        <div class="content-principal p-3" style="padding-top: 20px;">
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module">
        import { verPanelPrincipal, verListaRelevamientos } from './frontend/js/relevamientos.js';
        import { verListaSolicitudes } from './frontend/js/solicitudes.js';

       // 🚀 Arranca la app mostrando el Dashboard original
console.log("1. Intentando arrancar el panel principal...");

verPanelPrincipal(); 

console.log("2. Función verPanelPrincipal() ejecutada.");
setTimeout(() => {
    const contenedor = document.querySelector('.content-principal');
    console.log("3. Contenido real de la caja después de cargar:", contenedor ? contenedor.innerHTML : "No existe la caja");
}, 500); // Le damos medio segundo para que el JS inyecte el HTML
        
        document.addEventListener('DOMContentLoaded', () => {
            
            // 🔒 1. CONTROL DE SEGURIDAD (CANDADO)
            const token = sessionStorage.getItem('token');
            const usuarioRaw = sessionStorage.getItem('usuario');

            if (!token || !usuarioRaw) {
                alert('Acceso denegado. Por favor, inicie sesión.');
                window.location.href = 'frontend/pages/login.html'; 
                return; 
            }

            // 🚪 3. FUNCIÓN AL BOTÓN "SALIR" (Ajustado para Desktop y Mobile)
            const realizarSalida = (e) => {
                e.preventDefault();
                if (confirm('¿Está seguro de que desea cerrar sesión en el sistema?')) {
                    sessionStorage.clear(); 
                    window.location.href = 'frontend/pages/login.html'; 
                }
            };

            document.getElementById('btn-salir-desktop')?.addEventListener('click', realizarSalida);
            document.getElementById('btn-salir-mobile')?.addEventListener('click', realizarSalida);

            // 🚀 Arranca la app mostrando el Dashboard original
            verPanelPrincipal(); 
            
            function cambiarEnlaceActivo(idBotonDesktop, idBotonMobile) {
                // Limpia desktop y mobile
                document.querySelectorAll('.sidebar .nav-link, .navbar-nav .nav-link').forEach(enlace => {
                    enlace.classList.remove('active');
                });
                
                document.getElementById(idBotonDesktop)?.classList.add('active');
                document.getElementById(idBotonMobile)?.classList.add('active');
            }

            // Clic en INICIO
            document.getElementById('btn-menu-inicio')?.addEventListener('click', (e) => {
                e.preventDefault();
                cambiarEnlaceActivo('btn-menu-inicio', 'btn-mobile-inicio');
                verPanelPrincipal();
            });
            document.getElementById('btn-mobile-inicio')?.addEventListener('click', (e) => {
                e.preventDefault();
                cambiarEnlaceActivo('btn-menu-inicio', 'btn-mobile-inicio');
                verPanelPrincipal();
            });

            // Clic en RELEVAMIENTOS
            document.getElementById('btn-menu-relevamientos')?.addEventListener('click', (e) => {
                e.preventDefault();
                cambiarEnlaceActivo('btn-menu-relevamientos', 'btn-mobile-relevamientos');
                verListaRelevamientos();
            });
            document.getElementById('btn-mobile-relevamientos')?.addEventListener('click', (e) => {
                e.preventDefault();
                cambiarEnlaceActivo('btn-menu-relevamientos', 'btn-mobile-relevamientos');
                verListaRelevamientos();
            });

            // Clic en SOLICITUDES
            document.getElementById('btn-menu-solicitudes')?.addEventListener('click', (e) => {
                e.preventDefault();
                cambiarEnlaceActivo('btn-menu-solicitudes', 'btn-mobile-solicitudes');
                verListaSolicitudes();
            });
            document.getElementById('btn-mobile-solicitudes')?.addEventListener('click', (e) => {
                e.preventDefault();
                cambiarEnlaceActivo('btn-menu-solicitudes', 'btn-mobile-solicitudes');
                verListaSolicitudes();
            });
        }); 
    </script>
</body>
</html>
